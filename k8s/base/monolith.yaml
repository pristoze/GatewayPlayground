apiVersion: apps/v1
kind: Deployment
metadata:
  name: monolith
  labels:
    app.kubernetes.io/name: monolith
    app.kubernetes.io/component: monolith
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: monolith
  template:
    metadata:
      labels:
        app.kubernetes.io/name: monolith
        app.kubernetes.io/component: monolith
    spec:
      containers:
        - name: monolith
          image: gatewayplayground-monolith:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: aspnet-common-config
            - configMapRef:
                name: keycloak-auth-config
            - configMapRef:
                name: monolith-mode-config
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: monolith
  labels:
    app.kubernetes.io/name: monolith
    app.kubernetes.io/component: monolith
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: monolith
  ports:
    - name: http
      port: 8080
      targetPort: http
