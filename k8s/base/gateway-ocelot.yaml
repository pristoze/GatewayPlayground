apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-ocelot
  labels:
    app.kubernetes.io/name: gateway-ocelot
    app.kubernetes.io/component: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway-ocelot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway-ocelot
        app.kubernetes.io/component: gateway
    spec:
      containers:
        - name: gateway-ocelot
          image: gatewayplayground-gateway-ocelot:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: aspnet-common-config
            - configMapRef:
                name: keycloak-auth-config
            - configMapRef:
                name: gateway-ocelot-config
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-ocelot
  labels:
    app.kubernetes.io/name: gateway-ocelot
    app.kubernetes.io/component: gateway
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: gateway-ocelot
  ports:
    - name: http
      port: 8080
      targetPort: http
