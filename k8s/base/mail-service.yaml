apiVersion: apps/v1
kind: Deployment
metadata:
  name: mail-service
  labels:
    app.kubernetes.io/name: mail-service
    app.kubernetes.io/component: service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mail-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mail-service
        app.kubernetes.io/component: service
    spec:
      containers:
        - name: mail-service
          image: gatewayplayground-mailservice:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: aspnet-common-config
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mail-service
  labels:
    app.kubernetes.io/name: mail-service
    app.kubernetes.io/component: service
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mail-service
  ports:
    - name: http
      port: 8080
      targetPort: http
